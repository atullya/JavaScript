<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p class="hi"></p>
    <script>
      let getdata = localStorage.getItem("itemname");
      let obj = JSON.parse(getdata);
      console.log(obj);
      let content = `
<p> Name:${obj.name}</p>
<p>Description: ${obj.description}</p>
Image:
<img src="${obj.image}" alt="This is image">


`;

      document.querySelector(".hi").innerHTML = content;

      // <p> ${}
    </script>
  </body>
</html>
