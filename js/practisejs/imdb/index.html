<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Top Rated Movies</h1>
    <p id="show"></p>
    <script>
      const getData = () => {
        fetch(
          `https://api.themoviedb.org/3/movie/popular?api_key=4e44d9029b1270a757cddc766a1bcb63&language=en-US`
        )
          .then((res) => res.json())
          .then((data) => {
            console.log(data.results); // Logs the array of movies

            let show = document.getElementById("show");
            let alldata = data.results; // Access the 'results' array
            let content = "";

            alldata.forEach((element) => {
              content += `
                ${element.id}<br>
                <img src="https://image.tmdb.org/t/p/w500${element.poster_path}" alt="Poster Image"><br>
                <img src="https://image.tmdb.org/t/p/w500${element.backdrop_path}" alt="Backdrop Image"><br>
              `;
            });

            show.innerHTML = content;
          });
      };

      getData();
    </script>
    <style>
    @media only screen and (max-width: 600px) {
  body {
    background-color: lightblue;
  }
  img{
    height: 200px;
  }
  h1{
    color:red;
  }
}
    </style>
  </body>
</html>
