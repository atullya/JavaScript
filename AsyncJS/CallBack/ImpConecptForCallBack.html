<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //for ice-cream business

      //using seTimeOut

      // stocks will hold our ingredient or simpliy it works as a backend here
      let stocks = {
        Fruits: ["strawberry", "grapes", "banana", "apple"],
        liquid: ["water", "ice"],
        holder: ["cone", "cup", "stick"],
        toppings: ["chocolate", "peanuts"],
      };

      //using arrow function for callback

      let order = (Fruit_name, call_production) => {
        setTimeout(() => {
          console.log(`${stocks.Fruits[Fruit_name]} was selected`);
          call_production();
        }, 2000);

        //if call_production() here than it will print production has started first because of setTimeout value 200 then only it will print ... was selected to avoid it we call it inside setTimout
        // call_production();
      };

      //This is aka callback hell in order to solve  it we use promise and

      let production = () => {
        setTimeout(() => {
          console.log("production has started");

          setTimeout(() => {
            console.log("the fruit has been chopped");

            setTimeout(() => {
              console.log(
                `${stocks.liquid[0]} and ${stocks.liquid[1]} was added`
              );
              setTimeout(() => {
                console.log("Machine has been started!");
                setTimeout(() => {
                  console.log(` Ice-cream was placed on ${stocks.holder[0]}`);
                  setTimeout(() => {
                    console.log(`${stocks.toppings[0]} was added as toppings`);
                    setTimeout(() => {
                      console.log("Serve Icecream");
                    }, 2000);
                  }, 3000);
                }, 2000);
              }, 1000);
            }, 1000);
          }, 2000);
        }, 0);
      };
      order(0, production);
    </script>
  </body>
</html>
