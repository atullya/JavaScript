<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #385078;
      }
      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .btn {
        padding: 10px 60px;
        background-color: #fff;
        border: 0;
        outline: none;
        cursor: pointer;
        border-radius: 30px;
      }
      .popup {
        width: 400px;
        background-color: #fff;
        border-radius: 6px;
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.1);
        text-align: center;
        padding: 0 30px 30px;
        color: #333;
        visibility: hidden;
        transition: transform 0.4s, top 0.4s;
      }
      .open-popup {
        visibility: visible;
        top: 50%;
        transform: translate(-50%, -50%) scale(1);
      }
      .popup img {
        width: 100%;
        margin-top: -50px;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .popup h2 {
        font-size: 38px;
        font-weight: 500;
        margin: 30px 0 10px;
      }
      .popup button {
        width: 100%;
        margin-top: 50px;
        padding: 10px 0;
        background: #6fd649;
        color: white;
        border: 0;
        outline: none;
        font-size: 18px;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 5px 5px rgba(0, 0, 0, 0.2);
      }
    </style>

    <div class="container">
      <button onclick="openPopup()" type="submit" class="btn">Submit</button>
      <div class="popup" id="popup">
        <img
          src="https://media.istockphoto.com/id/1428616735/vector/check-mark-icon-for-design-easily-editable.jpg?s=612x612&w=0&k=20&c=_wQkZPxqSHRETIjMyjqPrdFI-4e4c2KofAcJxtkJl98="
          alt=""
        />
        <h2>Thank YOu</h2>
        <p>YOur details have been submiteed</p>
        <button onclick="closePopup()" id="closebtn">OK</button>
      </div>
    </div>
    <script>
      let popup = document.getElementById("popup");
      function openPopup() {
        popup.classList.add("open-popup");
      }

      function closePopup() {
        popup.classList.remove("open-popup");
      }
    </script>
  </body>
</html>
