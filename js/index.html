<!DOCTYPE html>

    <title>Document</title>

  <body>
    <script>
      let getData = async () => {
        try {
          let response = await fetch("people.json");
          console.log(response);
          if (!response.ok) {
            throw new Error("Can't connect");
          }
          let data = await response.json();
          let content = "";

          data.forEach((para) => {
            // To display names in the document
            content += `<b>Name:${para.name}</b>
              <p>Id:${para.id}</p>
              <p>Address:${para.address}</p>
              <p>Phone:${para.phone}</p>
              <br><br>
              
              `;
          });
          document.write(content);
        } catch (error) {
          console.log(error);
        }
      };
